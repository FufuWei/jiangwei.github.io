<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - 我的知识库</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
<script>
window.CMS_MANUAL_INIT = true;
window.initCMS = function() {
  DecapCMS.init({
    config: {
      backend: {
        name: 'github',
        repo: 'FufuWei/jiangwei.github.io',
        branch: 'main',
        auth_type: 'pkce',
        app_id: 'Ov23li5Op2IDBOT9Lugo'
      },
      media_folder: 'assets/uploads',
      public_folder: '/assets/uploads',
      locale: 'zh_Hans',
      collections: [
        {
          name: 'business',
          label: '业务',
          folder: 'business',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: '布局', name: 'layout', widget: 'hidden', default: 'default' },
            { label: '标题', name: 'title', widget: 'string' },
            { label: '正文', name: 'body', widget: 'markdown' }
          ]
        },
        {
          name: 'professional',
          label: '专业',
          folder: 'professional',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: '布局', name: 'layout', widget: 'hidden', default: 'default' },
            { label: '标题', name: 'title', widget: 'string' },
            { label: '正文', name: 'body', widget: 'markdown' }
          ]
        },
        {
          name: 'ai',
          label: 'AI',
          folder: 'ai',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: '布局', name: 'layout', widget: 'hidden', default: 'default' },
            { label: '标题', name: 'title', widget: 'string' },
            { label: '正文', name: 'body', widget: 'markdown' }
          ]
        }
      ]
    }
  });
};
window.initCMS();
</script>
</body>
</html>
